@import logic.DeveloperPolicies.developerPolicyLink

@(policy: DeveloperPolicy)

<li class="developer-policy-item">
    <div class="developer-policy-item-janus expand">
        <div class="developer-policy-item-entry">
            <span class="developer-policy-chip chip" aria-label="Janus tag">
                @{policy.policyGrantId}
            </span>
        </div>
        <div class="developer-policy-item-entry grey-text developer-policy-description expand" aria-label="Description of role">
            @{policy.description.getOrElse("No description.")}
        </div>
    </div>
    <div class="developer-policy-item-aws">
        <div class="developer-policy-name" aria-label="IAM name of the role in AWS">
            @policy.policyName
        </div>
        <div class="developer-policy-item-cta">
            <a class="copy-text--button__cta waves-effect waves-light btn" href="@developerPolicyLink(policy)" target="_blank" rel="noopener noreferrer">
                View in AWS console
                <div class="copy-text__feedback">
                    <i class="material-icons copy-text--default icon-small">open_in_new</i>
                </div>
            </a>
        </div>
    </div>
</li>
